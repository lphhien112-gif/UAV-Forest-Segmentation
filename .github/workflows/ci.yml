name: Forest Segmentation CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 src/ scripts/ train.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warnings (non-blocking)
          flake8 src/ scripts/ train.py --count --exit-zero --max-complexity=15 --max-line-length=120 --statistics

      - name: Test imports
        run: |
          python -c "from src.data.dataset import ForestDataset, CLASS_NAMES, NUM_CLASSES; print(f'OK: {NUM_CLASSES} classes')"
          python -c "from src.models import build_model, MODEL_REGISTRY; print(f'OK: {list(MODEL_REGISTRY.keys())}')"
          python -c "from src.training.losses import CEDiceLoss; print('OK: losses')"
          python -c "from src.training.metrics import SegmentationMetrics; print('OK: metrics')"
          python -c "from src.evaluation.evaluator import Evaluator; print('OK: evaluator')"
          python -c "from src.evaluation.deforestation import compute_deforestation_index; print('OK: deforestation')"

      - name: Test model builds
        run: |
          python -c "
          import torch
          from src.models import build_model
          for name in ['unet', 'deeplabv3plus']:
              model = build_model(name, encoder='resnet18', num_classes=11)
              x = torch.randn(1, 3, 256, 256)
              out = model(x)
              print(f'{name}: input={x.shape} -> output={out.shape}')
              assert out.shape == (1, 11, 256, 256), f'Bad shape: {out.shape}'
          print('All model build tests passed!')
          "

      - name: Test metrics
        run: |
          python -c "
          import torch
          from src.training.metrics import SegmentationMetrics
          m = SegmentationMetrics(num_classes=11)
          preds = torch.randint(0, 11, (2, 64, 64))
          targets = torch.randint(0, 11, (2, 64, 64))
          m.update(preds, targets)
          results = m.compute()
          assert 'miou' in results, 'Missing miou'
          assert 0 <= results['miou'] <= 1, f'Invalid miou: {results[\"miou\"]}'
          print(f'Metrics test passed: mIoU={results[\"miou\"]:.4f}')
          "

      - name: Test losses
        run: |
          python -c "
          import torch
          from src.training.losses import CEDiceLoss
          criterion = CEDiceLoss(num_classes=11)
          logits = torch.randn(2, 11, 64, 64)
          targets = torch.randint(0, 11, (2, 64, 64))
          loss = criterion(logits, targets)
          assert loss.item() > 0, 'Loss should be positive'
          loss.backward()
          print(f'Loss test passed: loss={loss.item():.4f}')
          "

      - name: Test download script (dry run)
        run: |
          python scripts/download_zenodo.py --dry-run --seq 1
