# HRNet Training Configuration
model:
  name: "hrnet"
  encoder: "tu-hrnet_w18"
  encoder_weights: "imagenet"
  num_classes: 11
  activation: null

training:
  epochs: 100
  batch_size: 4  # HRNet uses more memory, smaller batch
  num_workers: 4
  pin_memory: true

  optimizer:
    name: "adamw"
    lr: 5.0e-4
    weight_decay: 1.0e-4

  scheduler:
    name: "cosine"
    T_max: 100
    eta_min: 1.0e-6

  loss:
    name: "cross_entropy_dice"
    ce_weight: 1.0
    dice_weight: 0.5

  early_stopping:
    patience: 20
    monitor: "val_miou"
    mode: "max"

  amp: true
  accumulation_steps: 2  # Effective batch size = 4 * 2 = 8

augmentation:
  train:
    resize: [512, 512]
    horizontal_flip: 0.5
    rotate_limit: 15
    brightness_limit: 0.2
    contrast_limit: 0.2
    saturation_limit: 0.2
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]
  val:
    resize: [512, 512]
    normalize:
      mean: [0.485, 0.456, 0.406]
      std: [0.229, 0.224, 0.225]

output:
  dir: "outputs"
  checkpoint_dir: "outputs/checkpoints"
  log_dir: "outputs/logs"
  save_top_k: 3

logging:
  tensorboard: true
  wandb: false
  log_every_n_steps: 10
